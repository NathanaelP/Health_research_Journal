<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login &mdash; Health Research Journal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
  <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4">
      <h1 class="h4 text-center mb-1">&#x1F9EA; Health Journal</h1>
      <p class="text-center text-muted small mb-4">Private research library</p>

      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" type="text" id="username" name="username" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" name="password" required>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-dark">Log in</button>
        </div>
      </form>

      <p class="text-center text-muted small mt-3">
        Default login: <strong>admin</strong> / <strong>changeme</strong>
      </p>
    </div>
  </div>
</div>
</body>
</html>
